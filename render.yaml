# Render.com Blueprint
# Deploy server with client built-in

services:
  # Backend API Server (serves frontend too)
  - type: web
    name: cinesync-server
    env: node
    region: oregon
    rootDir: .
    buildCommand: npm run build
    startCommand: npm run start:server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
